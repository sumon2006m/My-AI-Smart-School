<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart School LMS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>🏫 AI Smart School LMS</header>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="card">
    <h3>🔐 Login</h3>

    <!-- 🔥 Dynamic School -->
    <select id="schoolId"></select>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <div class="card">
    👋 Welcome <span id="userName"></span><br>
    🏫 <span id="schoolName"></span><br>
    🎓 Class: <span id="userClass"></span><br>
    📱 Mobile: <span id="userMobile"></span>
  </div>

  <div class="grid">
    <div class="card" onclick="show('courses')">📚 Courses</div>
    <div class="card" onclick="show('quiz')">🧠 Quiz</div>
    <div class="card" onclick="show('leaderboard')">🏆 Rank</div>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<!-- COURSES -->
<div id="courses" class="screen">
  <h3>📚 Courses</h3>

  <select id="classFilter" onchange="loadCourses()">
    <option value="">All Classes</option>
    <option value="6">Class 6</option>
    <option value="7">Class 7</option>
  </select>

  <div id="courseBox"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <h3>🧠 Quiz</h3>
  <div id="quizBox"></div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="screen">
  <h3>🏆 Leaderboard</h3>
  <div id="leadBox"></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
